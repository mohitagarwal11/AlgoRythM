<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <link href="style.css" rel="stylesheet" />
    <script src="sorting.js" defer></script>
    <script src="searching.js" defer></script>
    <script src="animation-engine.js" defer></script>
    <script src="script.js" defer></script>
    <title>AlgoRyth-M</title>
  </head>

  <body>
    <button id="home_btn">← Home</button>

    <button
      id="help_btn"
      type="button"
      aria-controls="quick_tips"
      aria-expanded="true"
    >
      Hide Guide
    </button>

    <h1>AlgoRyth-M</h1>
    <aside id="quick_tips" class="quick_tips" aria-live="polite">
      <div class="quick_tips_header">
        <div>
          <div class="quick_tips_eyebrow">Quick Guide</div>
          <h2 id="quick_tips_title">New Here?</h2>
        </div>
      </div>
      <p id="quick_tips_message"></p>
      <ul id="quick_tips_list"></ul>
    </aside>
    <div class="button_container">
      <button id="sort">SORTING</button>
      <button id="search">SEARCHING</button>
    </div>

    <div id="sort_status"></div>
    <div id="search_status"></div>

    <div class="stats_container">
      <div>Compares: <span id="compares">0</span></div>
      <div>Swaps: <span id="swaps">0</span></div>
      <div>Overwrites: <span id="overwrites">0</span></div>
    </div>

    <div class="array_container" id="array_container">
      <div id="target_indicator"></div>
      <!-- bars get added here -->
    </div>

    <div id="utility">
      <button id="generate">Generate New</button>
      <button id="pause">Pause</button>
      <button id="prev">Previous</button>
      <button id="next">Next</button>

      <label for="speed_slider">Speed:</label>
      <input type="range" id="speed_slider" min="1" max="250" value="50" />

      <label for="arrLen">Array Size:</label>
      <input type="number" id="arrLen" min="5" max="475" value="15" />

      <label for="numbersInput">Array:</label>
      <input type="text" id="numbersInput" placeholder="Eg: 1 2 3 4 5... " />
      <button onclick="getUserArray()">Generate</button>
    </div>

    <div id="sorting_btns">
      <button id="merge">Merge Sort</button>
      <button id="heap">Heap Sort</button>
      <button id="quick">Quick Sort</button>
      <button id="bubble">Bubble Sort</button>
      <button id="selection">Selection Sort</button>
    </div>

    <div id="searching_btns">
      <button id="binary">Binary Search</button>
      <button id="linear">Linear Search</button>

      <label for="target">Target:</label>
      <input type="number" id="target" placeholder="Hover Bars" />

      <button id="random">Random Target</button>
    </div>
  </body>
</html>
